<!DOCTYPE html>
<html>
<head>
    <title>Recommendation Result</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            width: 500px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        h3 {
            margin-top: 25px;
            color: #555;
        }

        ol {
            padding-left: 20px;
        }

        ol li {
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fc;
            border-radius: 8px;
            font-size: 15px;
        }

        ul {
            padding-left: 20px;
        }

        ul li {
            margin-bottom: 8px;
            color: #444;
        }

        .confidence {
            color: #4e73df;
            font-weight: bold;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 25px;
            padding: 10px;
            background: #4e73df;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #2e59d9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 550px) {
            .container {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Top Career Recommendations</h2>

        <ol>
            {% for career, score in results %}
            <li>
                <strong>{{ career }}</strong> —
                Confidence:
                <span class="confidence">
                    {{ "%.2f"|format(score) }}
                </span>
            </li>
            {% endfor %}
        </ol>

        <h3>Why these careers?</h3>
        <ul>
            {% for reason in explanations %}
            <li>{{ reason }}</li>
            {% endfor %}
        </ul>

        <a href="/" class="back-btn">Try Again</a>
    </div>
</body>
</html>
